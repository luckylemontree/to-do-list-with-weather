<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- sample app gradient (Dawn scene) to show the translucent "glass white" over it -->
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8eb8e5"/>
      <stop offset="60%" stop-color="#e0a06a"/>
      <stop offset="100%" stop-color="#e3855a"/>
    </linearGradient>
  </defs>

  <!-- title -->
  <text x="40" y="48" fill="#1f1f1f" font-size="28" font-weight="700">Colour Palette</text>
  <text x="40" y="74" fill="#7a7a7a" font-size="14">Warm, natural palette with frosted-glass overlays</text>
  <line x1="40" y1="92" x2="780" y2="92" stroke="#e2e2e2" stroke-width="2"/>

  <!-- ===== row: Orange ===== -->
  <rect x="40" y="112" width="150" height="74" rx="10" fill="#f77512" stroke="#d8d8d8" stroke-width="1"/>
  <text x="210" y="142" fill="#1f1f1f" font-size="19" font-weight="700">Orange</text>
  <text x="210" y="166" fill="#555" font-size="15" font-family="Consolas,'Courier New',monospace">#f77512</text>
  <text x="430" y="155" fill="#666" font-size="14">Default accent — buttons, task borders, active stars</text>

  <!-- ===== row: Off-white ===== -->
  <rect x="40" y="200" width="150" height="74" rx="10" fill="#f6f4f2" stroke="#d8d8d8" stroke-width="1"/>
  <text x="210" y="230" fill="#1f1f1f" font-size="19" font-weight="700">Off-white</text>
  <text x="210" y="254" fill="#555" font-size="15" font-family="Consolas,'Courier New',monospace">#f6f4f2</text>
  <text x="430" y="243" fill="#666" font-size="14">Default text colour</text>

  <!-- ===== row: Glass white (translucent over scene) ===== -->
  <rect x="40" y="288" width="150" height="74" rx="10" fill="url(#scene)" stroke="#d8d8d8" stroke-width="1"/>
  <rect x="40" y="288" width="150" height="74" rx="10" fill="#ffffff" fill-opacity="0.2" stroke="#d8d8d8" stroke-width="1"/>
  <text x="210" y="318" fill="#1f1f1f" font-size="19" font-weight="700">Glass white</text>
  <text x="210" y="342" fill="#555" font-size="14" font-family="Consolas,'Courier New',monospace">rgba(255,255,255,0.2)</text>
  <text x="430" y="331" fill="#666" font-size="14">Panel backgrounds (frosted glass)</text>

  <!-- ===== row: Green tint ===== -->
  <rect x="40" y="376" width="150" height="74" rx="10" fill="rgb(195,249,228)" stroke="#d8d8d8" stroke-width="1"/>
  <text x="210" y="406" fill="#1f1f1f" font-size="19" font-weight="700">Green tint</text>
  <text x="210" y="430" fill="#555" font-size="14" font-family="Consolas,'Courier New',monospace">rgb(195,249,228)</text>
  <text x="430" y="419" fill="#666" font-size="14">Date display</text>

  <!-- ===== row: Pure white ===== -->
  <rect x="40" y="464" width="150" height="74" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="210" y="494" fill="#1f1f1f" font-size="19" font-weight="700">Pure white</text>
  <text x="210" y="518" fill="#555" font-size="15" font-family="Consolas,'Courier New',monospace">#ffffff</text>
  <text x="430" y="507" fill="#666" font-size="14">Time display and weather text</text>
</svg>
